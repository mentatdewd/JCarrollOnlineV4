<mat-card class="gravatar-card">
  <mat-card-header>
    <img mat-card-avatar appGravatar email="mentatdewd@comcast.net">
    <mat-card-title>{{this.userinfo?.user_name}}</mat-card-title>
    <mat-card-subtitle>{{this.userinfo?.user_post_count}} Posts</mat-card-subtitle> Followers {{this.userinfo?.user_followers_count}} Following {{this.userinfo?.user_following_count}}
  </mat-card-header>
  <mat-card-content>
    <div layout="row" layout-align="start center" flex>
      <span flex></span>
    </div> </mat-card-content>
</mat-card>
